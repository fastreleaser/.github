name: Feature request
description: Suggest an improvement for a FastReleaser repository.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: repo
    attributes:
      label: Repository
      description: Which FastReleaser repository should this apply to?
      placeholder: fastreleaser/fastreleaser
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Extra context
